# ============================================================
# WORKFLOW 3 : SQL LINT
# Fichier : .github/workflows/sql-lint.yml
#
# Objectif : vérifier la qualité du SQL dans le projet.
# sqlfluff est un linter SQL, l'équivalent de ruff mais pour SQL.
# Il vérifie le style, les conventions, et certaines erreurs.
# ============================================================

name: SQL Lint

on:
  push:
    branches: [main]

    paths:
      - "airflow/dags/plugins/helpers/**"
      - "**/*.sql"
  pull_request:
    branches: [main]
    paths:
      - "airflow/dags/plugins/helpers/**"
      - "**/*.sql"

jobs:
  sql-lint:
    name: Check SQL quality
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Extract SQL from Python file
        run: |
          mkdir -p tmp_sql
          python -c "
          import re

          with open('airflow/dags/plugins/helpers/final_project_sql_statements.py') as f:
              content = f.read()

          # Cherche toutes les chaînes entre triple quotes
          pattern = r'\"\"\"(.*?)\"\"\"'
          matches = re.findall(pattern, content, re.DOTALL)

          for i, sql in enumerate(matches):
              with open(f'tmp_sql/query_{i}.sql', 'w') as f:
                  f.write(sql.strip())
              print(f'Extracted query_{i}.sql')
          "

      - name: Run SQL lint
        run: sqlfluff lint tmp_sql/ --dialect postgres